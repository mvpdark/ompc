services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: opc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d opc"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  zscj:
    build:
      context: ../OMPC-ZSCJ/backend
      dockerfile: Dockerfile
    ports:
      - "8011:8011"
    environment:
      DATABASE_URL: sqlite:///./zscj.db
      JWT_SECRET_KEY: replace-with-a-long-random-secret
      AUTH_REQUIRED: "false"
      FRONTEND_ORIGIN: http://localhost:3000
    volumes:
      - zscj_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8011/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
  zscj_data:
